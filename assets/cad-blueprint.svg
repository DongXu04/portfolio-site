<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <!-- Small grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2563eb" stroke-opacity="0.15" stroke-width="0.5"/>
    </pattern>
    <!-- Large grid pattern -->
    <pattern id="bigGrid" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="url(#grid)"/>
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- Base Grid -->
  <rect width="100%" height="100%" fill="url(#bigGrid)"/>

  <!-- =============================== -->
  <!-- ABSTRACT ROBOT ARM SCHEMATIC      -->
  <!-- =============================== -->
  <g stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-opacity="0.25">
    <!-- Links -->
    <path d="M 150 700 L 150 650 L 220 500 L 220 350 L 300 250 L 350 250" stroke-width="3" stroke-linecap="square"/>
    <!-- Joints -->
    <circle cx="150" cy="650" r="15"/>
    <circle cx="150" cy="650" r="5"/>
    <circle cx="220" cy="500" r="20"/>
    <circle cx="220" cy="500" r="8"/>
    <circle cx="220" cy="350" r="15"/>
    <circle cx="220" cy="350" r="6"/>
    <circle cx="300" cy="250" r="12"/>
    <!-- Base -->
    <rect x="100" y="700" width="100" height="40"/>
    <line x1="120" y1="740" x2="180" y2="740"/>
    <!-- Claw -->
    <path d="M 350 240 L 380 230 L 380 250 L 350 260 M 350 250 L 380 270"/>
    
    <!-- Dimensions / Guides for Robot Arm -->
    <path d="M 100 500 L 80 500 M 100 650 L 80 650 M 90 500 L 90 650" stroke-width="1" stroke-dasharray="4"/>
    <text x="65" y="580" fill="#60a5fa" font-size="10" font-family="monospace" opacity="0.3" transform="rotate(-90 65,580)">L1 = 150mm</text>
  </g>

  <!-- =============================== -->
  <!-- ABSTRACT AGV / SMART CAR SCHEMATIC -->
  <!-- =============================== -->
  <g stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-opacity="0.25">
    <!-- Chassis -->
    <path d="M 500 600 L 700 600 L 750 650 L 750 720 L 450 720 L 450 650 Z" stroke-width="2"/>
    <path d="M 450 650 L 750 650" stroke-width="1" stroke-dasharray="5 5"/>
    
    <!-- Wheels -->
    <circle cx="520" cy="720" r="25"/>
    <circle cx="520" cy="720" r="15" stroke-dasharray="2 4"/>
    <circle cx="680" cy="720" r="25"/>
    <circle cx="680" cy="720" r="15" stroke-dasharray="2 4"/>
    
    <!-- Sensors / Details -->
    <rect x="440" y="660" width="10" height="20"/>
    <rect x="750" y="680" width="10" height="15"/>
    <path d="M 550 560 L 560 600 M 650 560 L 640 600" stroke-width="1"/>
    
    <!-- Top-mounted LIDAR / Camera block -->
    <rect x="580" y="570" width="40" height="30"/>
    <circle cx="600" cy="585" r="8"/>
    
    <!-- Dimensions lines -->
    <path d="M 450 760 L 750 760 M 450 750 L 450 770 M 750 750 L 750 770" stroke-width="1"/>
    <text x="560" y="780" fill="#60a5fa" font-size="12" font-family="monospace" opacity="0.3">W = 300mm</text>
  </g>

  <!-- =============================== -->
  <!-- ADDITIONAL CAD ELEMENTS          -->
  <!-- =============================== -->
  <g stroke="#3b82f6" stroke-width="1" stroke-opacity="0.25">
    <!-- Concentric targeting/angle marks top left -->
    <circle cx="200" cy="200" r="40" fill="none"/>
    <circle cx="200" cy="200" r="60" fill="none" stroke-dasharray="4 4"/>
    <line x1="120" y1="200" x2="280" y2="200"/>
    <line x1="200" y1="120" x2="200" y2="280"/>
    <text x="210" y="190" fill="#60a5fa" font-size="10" font-family="monospace" opacity="0.3">R=40</text>
    <text x="210" y="170" fill="#60a5fa" font-size="10" font-family="monospace" opacity="0.3">R=60</text>
    
    <!-- Center top abstract isometric part -->
    <path d="M 600 100 L 650 120 L 650 180 L 600 200 L 550 180 L 550 120 Z" fill="none"/>
    <path d="M 600 100 L 600 150 L 650 120 M 600 150 L 550 120 M 600 150 L 600 200" fill="none"/>
    
    <!-- Data block / Title block outline in bottom right -->
    <rect x="650" y="40" width="120" height="80" fill="none"/>
    <line x1="650" y1="60" x2="770" y2="60"/>
    <line x1="650" y1="80" x2="770" y2="80"/>
    <line x1="710" y1="80" x2="710" y2="120"/>
    <text x="660" y="55" fill="#60a5fa" font-size="8" font-family="monospace" opacity="0.3">PROJ: PORTFOLIO</text>
    <text x="660" y="75" fill="#60a5fa" font-size="8" font-family="monospace" opacity="0.3">SCALE: 1:10</text>
    <text x="660" y="95" fill="#60a5fa" font-size="8" font-family="monospace" opacity="0.3">REV: A</text>
  </g>
</svg>
