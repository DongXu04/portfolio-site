<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- Glow filter for traces -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Stronger glow for pads/vias -->
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ============================= -->
  <!--      MAIN TRACE ROUTES        -->
  <!-- ============================= -->

  <!-- Trace 1: Left edge → L-turn down → continues right -->
  <path d="M0 60 H120 V150 H200" stroke="#b8860b" stroke-opacity="0.35" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Trace 2: Top edge → Z-route across top-right -->
  <path d="M270 0 V70 H340 V130" stroke="#b8860b" stroke-opacity="0.30" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Trace 3: Long horizontal bus with T-branch down -->
  <path d="M0 250 H180" stroke="#b8860b" stroke-opacity="0.32" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M100 250 V330 H190" stroke="#b8860b" stroke-opacity="0.28" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Trace 4: Bottom-right → up → exits right edge -->
  <path d="M300 400 V310 H400" stroke="#b8860b" stroke-opacity="0.32" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Trace 5: Internal route mid-right -->
  <path d="M230 180 H330 V220 H400" stroke="#b8860b" stroke-opacity="0.25" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Trace 6: Vertical bus line through center -->
  <path d="M210 200 V400" stroke="#b8860b" stroke-opacity="0.18" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Trace 7: Right edge → left turn → down -->
  <path d="M400 170 H350 V240 H310" stroke="#b8860b" stroke-opacity="0.25" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Trace 8: Top-center route -->
  <path d="M150 0 V40 H220 V100" stroke="#b8860b" stroke-opacity="0.22" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Trace 9: Bottom-left L-shape exits bottom -->
  <path d="M40 340 H110 V400" stroke="#b8860b" stroke-opacity="0.28" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Trace 10: Short stub left side -->
  <path d="M0 150 H60" stroke="#b8860b" stroke-opacity="0.22" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Trace 11: Diagonal-free stepped route -->
  <path d="M260 260 V300 H340 V360 H400" stroke="#b8860b" stroke-opacity="0.22" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Trace 12: Top left short vertical -->
  <path d="M60 0 V30" stroke="#b8860b" stroke-opacity="0.20" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glow)"/>


  <!-- ============================= -->
  <!--       SOLDER PADS             -->
  <!-- ============================= -->

  <!-- Junction pads (larger, brighter) -->
  <circle cx="120" cy="60" r="6" fill="#b8860b" fill-opacity="0.22" filter="url(#glowStrong)"/>
  <circle cx="120" cy="150" r="6" fill="#b8860b" fill-opacity="0.20" filter="url(#glowStrong)"/>
  <circle cx="200" cy="150" r="6" fill="#b8860b" fill-opacity="0.20" filter="url(#glowStrong)"/>
  <circle cx="180" cy="250" r="6" fill="#b8860b" fill-opacity="0.22" filter="url(#glowStrong)"/>
  <circle cx="190" cy="330" r="5" fill="#b8860b" fill-opacity="0.18" filter="url(#glowStrong)"/>
  <circle cx="310" cy="240" r="5" fill="#b8860b" fill-opacity="0.18" filter="url(#glowStrong)"/>
  <circle cx="40" cy="340" r="5" fill="#b8860b" fill-opacity="0.18" filter="url(#glowStrong)"/>
  <circle cx="60" cy="150" r="5" fill="#b8860b" fill-opacity="0.16" filter="url(#glowStrong)"/>
  <circle cx="60" cy="30" r="5" fill="#b8860b" fill-opacity="0.16" filter="url(#glowStrong)"/>


  <!-- ============================= -->
  <!--       VIA HOLES               -->
  <!-- ============================= -->

  <!-- Via: T-junction on trace 3 -->
  <circle cx="100" cy="250" r="7" fill="none" stroke="#b8860b" stroke-opacity="0.40" stroke-width="2" filter="url(#glowStrong)"/>
  <circle cx="100" cy="250" r="3" fill="#b8860b" fill-opacity="0.25"/>

  <!-- Via: trace 2 turn -->
  <circle cx="270" cy="70" r="6" fill="none" stroke="#b8860b" stroke-opacity="0.35" stroke-width="2" filter="url(#glowStrong)"/>
  <circle cx="270" cy="70" r="2.5" fill="#b8860b" fill-opacity="0.22"/>

  <!-- Via: trace 4 turn -->
  <circle cx="300" cy="310" r="7" fill="none" stroke="#b8860b" stroke-opacity="0.35" stroke-width="2" filter="url(#glowStrong)"/>
  <circle cx="300" cy="310" r="3" fill="#b8860b" fill-opacity="0.22"/>

  <!-- Via: bus line start -->
  <circle cx="210" cy="200" r="5.5" fill="none" stroke="#b8860b" stroke-opacity="0.30" stroke-width="1.8" filter="url(#glowStrong)"/>
  <circle cx="210" cy="200" r="2.2" fill="#b8860b" fill-opacity="0.18"/>

  <!-- Via: trace 8 end -->
  <circle cx="220" cy="100" r="5.5" fill="none" stroke="#b8860b" stroke-opacity="0.30" stroke-width="1.8" filter="url(#glowStrong)"/>
  <circle cx="220" cy="100" r="2.2" fill="#b8860b" fill-opacity="0.18"/>

  <!-- Via: trace 5 turn -->
  <circle cx="330" cy="180" r="5" fill="none" stroke="#b8860b" stroke-opacity="0.28" stroke-width="1.8" filter="url(#glowStrong)"/>
  <circle cx="330" cy="180" r="2" fill="#b8860b" fill-opacity="0.16"/>

  <!-- Via: trace 11 mid -->
  <circle cx="340" cy="300" r="5" fill="none" stroke="#b8860b" stroke-opacity="0.25" stroke-width="1.5" filter="url(#glowStrong)"/>
  <circle cx="340" cy="300" r="2" fill="#b8860b" fill-opacity="0.15"/>

  <!-- Standalone vias (not on visible traces — suggests hidden layers) -->
  <circle cx="55" cy="110" r="4.5" fill="none" stroke="#b8860b" stroke-opacity="0.22" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="55" cy="110" r="1.8" fill="#b8860b" fill-opacity="0.12"/>

  <circle cx="370" cy="370" r="4.5" fill="none" stroke="#b8860b" stroke-opacity="0.22" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="370" cy="370" r="1.8" fill="#b8860b" fill-opacity="0.12"/>

  <circle cx="160" cy="190" r="4" fill="none" stroke="#b8860b" stroke-opacity="0.18" stroke-width="1.2" filter="url(#glow)"/>
  <circle cx="160" cy="190" r="1.5" fill="#b8860b" fill-opacity="0.10"/>


  <!-- ============================= -->
  <!--    IC CHIP FOOTPRINT          -->
  <!-- ============================= -->

  <!-- IC body -->
  <rect x="320" y="50" width="36" height="52" rx="3" fill="#b8860b" fill-opacity="0.04" stroke="#b8860b" stroke-opacity="0.20" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Pin 1 marker -->
  <circle cx="328" cy="58" r="2" fill="#b8860b" fill-opacity="0.15"/>
  <!-- Left pins -->
  <rect x="312" y="60" width="10" height="4" rx="1" fill="#b8860b" fill-opacity="0.18"/>
  <rect x="312" y="72" width="10" height="4" rx="1" fill="#b8860b" fill-opacity="0.18"/>
  <rect x="312" y="84" width="10" height="4" rx="1" fill="#b8860b" fill-opacity="0.18"/>
  <!-- Right pins -->
  <rect x="354" y="60" width="10" height="4" rx="1" fill="#b8860b" fill-opacity="0.18"/>
  <rect x="354" y="72" width="10" height="4" rx="1" fill="#b8860b" fill-opacity="0.18"/>
  <rect x="354" y="84" width="10" height="4" rx="1" fill="#b8860b" fill-opacity="0.18"/>


  <!-- ============================= -->
  <!--   RESISTOR FOOTPRINT          -->
  <!-- ============================= -->

  <!-- Resistor pads + body -->
  <rect x="58" y="196" width="24" height="10" rx="2" fill="#b8860b" fill-opacity="0.04" stroke="#b8860b" stroke-opacity="0.16" stroke-width="1" filter="url(#glow)"/>
  <rect x="52" y="198" width="8" height="6" rx="1" fill="#b8860b" fill-opacity="0.14"/>
  <rect x="80" y="198" width="8" height="6" rx="1" fill="#b8860b" fill-opacity="0.14"/>


  <!-- ============================= -->
  <!--   CAPACITOR FOOTPRINT         -->
  <!-- ============================= -->

  <circle cx="290" cy="150" r="3.5" fill="#b8860b" fill-opacity="0.14" filter="url(#glow)"/>
  <circle cx="290" cy="164" r="3.5" fill="#b8860b" fill-opacity="0.14" filter="url(#glow)"/>
  <line x1="290" y1="153" x2="290" y2="161" stroke="#b8860b" stroke-opacity="0.20" stroke-width="1.5"/>


  <!-- ============================= -->
  <!--   GROUND PLANE FRAGMENTS      -->
  <!-- ============================= -->

  <!-- Copper pour / ground fill hints -->
  <rect x="0" y="370" width="30" height="30" fill="#b8860b" fill-opacity="0.03"/>
  <rect x="370" y="0" width="30" height="30" fill="#b8860b" fill-opacity="0.03"/>
  <rect x="145" y="270" width="20" height="20" fill="#b8860b" fill-opacity="0.02"/>

</svg>
